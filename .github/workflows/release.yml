name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            os: windows-latest
            archive: pas-windows-x64.zip
            exe: pas.exe
          - name: macos-arm64
            os: macos-14
            archive: pas-macos-arm64.zip
            exe: pas

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install --upgrade pip pyinstaller -e .

      - name: Build executable
        run: pyinstaller --clean --onefile --paths src --collect-data certifi --name pas src/pas_automation/cli.py

      - name: Prepare package
        shell: bash
        run: |
          set -euo pipefail
          package="package-${{ matrix.name }}"
          mkdir -p "$package/bin"
          cp "dist/${{ matrix.exe }}" "$package/bin/"
          cp README.md pyproject.toml config.example.toml assignees.example.json "$package/"
          cp -R docs launchd scripts "$package/"

      - name: Archive package on macOS
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          cd "package-${{ matrix.name }}"
          chmod +x bin/pas scripts/*.sh
          zip -r "../${{ matrix.archive }}" .

      - name: Archive package on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "package-${{ matrix.name }}\*" -DestinationPath "${{ matrix.archive }}" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build
      - build-macos-menubar
      - build-windows-tray

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          files=$(find artifacts -name "*.zip" -type f | sort)
          notes_file=".github/release-notes/${TAG_NAME}.md"
          if [ ! -f "$notes_file" ]; then
            notes_file="$(mktemp)"
            cat > "$notes_file" <<EOF
          ## PAS ${TAG_NAME}

          태그 기반 자동 릴리즈입니다.

          ## 포함 파일

          - macOS 메뉴바 앱
          - Windows 트레이 앱
          - CLI 실행 패키지

          ## 안내

          설정 파일과 토큰은 릴리즈 파일에 포함되지 않습니다. 앱 최초 실행 후 설정 화면에서 로컬 설정을 입력해 주세요.
          EOF
          fi
          gh release create "$TAG_NAME" $files \
            --repo "$GITHUB_REPOSITORY" \
            --title "$TAG_NAME" \
            --notes-file "$notes_file"

  build-macos-menubar:
    name: Build macOS Menu Bar App
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python build tools
        run: python -m pip install --upgrade pip pyinstaller -e .

      - name: Build PAS core executable
        run: pyinstaller --clean --onefile --paths src --collect-data certifi --name pas src/pas_automation/cli.py

      - name: Build SwiftUI menu bar executable
        shell: bash
        run: |
          set +e
          set -o pipefail
          swift build -c release --package-path apps/macos/PASMenuBar 2>&1 | tee swift-build.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            python3 -c 'from pathlib import Path; lines = Path("swift-build.log").read_text(errors="replace").splitlines(); message = "\n".join(lines[-80:]); escaped = message.replace("%", "%25").replace("\r", "%0D").replace("\n", "%0A"); print(f"::error title=Swift build failed::{escaped}")'
          fi
          exit "$status"

      - name: Assemble app bundle
        shell: bash
        run: |
          set -euo pipefail
          APP="PAS.app"
          CONTENTS="$APP/Contents"
          MACOS="$CONTENTS/MacOS"
          RESOURCES="$CONTENTS/Resources"

          mkdir -p "$MACOS" "$RESOURCES/bin"
          cp apps/macos/PASMenuBar/Info.plist "$CONTENTS/Info.plist"
          VERSION="${GITHUB_REF_NAME#v}"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION" "$CONTENTS/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $GITHUB_RUN_NUMBER" "$CONTENTS/Info.plist"
          cp apps/macos/PASMenuBar/.build/release/PASMenuBar "$MACOS/PASMenuBar"
          cp dist/pas "$RESOURCES/bin/pas"
          cp config.example.toml "$RESOURCES/config.example.toml"
          cp assignees.example.json "$RESOURCES/assignees.example.json"
          python3 scripts/generate_macos_icon.py "$RESOURCES/AppIcon.iconset"
          iconutil -c icns "$RESOURCES/AppIcon.iconset" -o "$RESOURCES/AppIcon.icns"
          rm -rf "$RESOURCES/AppIcon.iconset"
          chmod +x "$MACOS/PASMenuBar" "$RESOURCES/bin/pas"
          codesign --force --deep --sign - "$APP"
          codesign --verify --deep --strict "$APP"

      - name: Archive app bundle
        run: ditto -c -k --keepParent PAS.app pas-macos-menubar-arm64.zip

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: pas-macos-menubar-arm64.zip
          path: pas-macos-menubar-arm64.zip
          if-no-files-found: error

  build-windows-tray:
    name: Build Windows Tray App
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Install Python build tools
        run: python -m pip install --upgrade pip pyinstaller -e .

      - name: Build PAS core executable
        run: pyinstaller --clean --onefile --paths src --collect-data certifi --name pas src/pas_automation/cli.py

      - name: Publish tray app
        run: dotnet publish apps/windows/PASTray/PASTray.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:PublishTrimmed=false -o publish/windows-tray

      - name: Assemble tray package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force package-windows-tray\bin | Out-Null
          Copy-Item publish\windows-tray\PASTray.exe package-windows-tray\
          Copy-Item dist\pas.exe package-windows-tray\bin\pas.exe
          Copy-Item config.example.toml package-windows-tray\
          Copy-Item assignees.example.json package-windows-tray\
          Copy-Item README.md package-windows-tray\
          Copy-Item docs package-windows-tray\docs -Recurse
          Compress-Archive -Path package-windows-tray\* -DestinationPath pas-windows-tray-x64.zip -Force

      - name: Upload tray artifact
        uses: actions/upload-artifact@v4
        with:
          name: pas-windows-tray-x64.zip
          path: pas-windows-tray-x64.zip
          if-no-files-found: error
