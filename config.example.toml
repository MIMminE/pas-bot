[general]
timezone = "Asia/Seoul"
git_author = "your-git-name-or-email"
work_end_time = "18:00"
data_dir = ".pas"

[jira]
base_url = "https://your-company.atlassian.net"
email = "you@example.com"
api_token = ""
default_project = "OPS"
todo_jql = "assignee = currentUser() AND statusCategory != Done ORDER BY priority DESC, updated DESC"
yesterday_assigned_jql = "assignee = currentUser() AND assignee CHANGED TO currentUser() DURING (startOfDay(-1), startOfDay())"
stale_jql = "assignee = currentUser() AND statusCategory != Done AND updated <= -5d"
high_priority_jql = "assignee = currentUser() AND statusCategory != Done AND priority in (Highest, High)"

[slack]
webhook_url = ""

[slack.webhooks]
default = ""
test = ""
morning_briefing = ""
evening_check = ""
jira_daily = ""
git_report = ""
git_status = ""
alerts = ""

[openai]
api_key = ""
model = "gpt-5-mini"

[github]
token = ""

[[github.repositories]]
owner = "your-org"
name = "your-repo"

[features]
morning_briefing = true
evening_check = true
jira_daily = true
git_report = true
git_status = true
dev_tools = true

[schedules.morning_briefing]
enabled = false
time = "09:00"
catch_up_if_missed = true
weekdays_only = true
holiday_dates = []

[schedules.evening_check]
enabled = false
time = "18:20"
catch_up_if_missed = true
weekdays_only = true
holiday_dates = []

[schedules.jira_daily]
enabled = false
time = "09:00"
catch_up_if_missed = true
weekdays_only = true
holiday_dates = []

[schedules.git_report]
enabled = false
